name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v3

      - name: Set node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*

      - name: Setup
        run: npm i -g @antfu/ni

      - name: Install
        run: nci

      - name: Lint
        run: nr lint

  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v3

      - name: Set node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*

      - name: Setup
        run: npm i -g @antfu/ni

      - name: Install
        run: nci

      - name: Build
        run: nr build

      - name: Typecheck
        run: nr typecheck

  ferriki-core-compat:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node

    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v3

      - name: Set node
        uses: actions/setup-node@v5
        with:
          node-version: 22.x

      - name: Set Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup
        run: npm i -g @antfu/ni

      - name: Install
        run: nci

      - name: Ferriki core compat
        run: pnpm run test:ferriki-compat:core

  ferriki-adapter-compat:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: node

    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v3

      - name: Set node
        uses: actions/setup-node@v5
        with:
          node-version: 22.x

      - name: Set Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup
        run: npm i -g @antfu/ni

      - name: Install
        run: nci

      - name: Ferriki adapter compat
        run: pnpm run test:ferriki-compat:adapters

  native-smoke:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: node

    strategy:
      matrix:
        node: [22.x]
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - node: 20.x
            os: ubuntu-latest
          - node: 18.x
            os: ubuntu-latest
      fail-fast: false

    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v3

      - name: Set node ${{ matrix.node }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}

      - name: Setup
        run: npm i -g @antfu/ni

      - name: Install
        run: nci

      - name: Build native
        run: pnpm run build:native

      - name: Import ferriki package
        run: node --input-type=module -e "await import('./ferriki/index.mjs')"
